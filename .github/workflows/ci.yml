name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TODO: re-enable once lint is cleaned up
      # - name: Lint
      #   run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build-time public vars can be dummies in CI if not required at compile time.
          # Add real NEXT_PUBLIC_* secrets here if the build fails without them.
          SKIP_ENV_VALIDATION: "1"
